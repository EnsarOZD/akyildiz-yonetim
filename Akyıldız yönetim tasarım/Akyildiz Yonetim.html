<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Akyıldız Yönetim</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Geist:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; min-height: 100vh; background: #080B14; font-family: "Plus Jakarta Sans", -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); background-clip: padding-box; }
  input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.3); }
  button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/icons.jsx"></script>
<script type="text/babel" src="components/themes.jsx"></script>
<script type="text/babel" src="components/mock-data.jsx"></script>
<script type="text/babel" src="components/ui-primitives.jsx"></script>
<script type="text/babel" src="components/dashboard.jsx"></script>
<script type="text/babel" src="components/tenants.jsx"></script>
<script type="text/babel" src="components/pages.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "royal",
  "showLogin": false
}/*EDITMODE-END*/;

function App() {
  const saved = (() => { try { return JSON.parse(localStorage.getItem('akyildiz_v2') || '{}'); } catch { return {}; } })();
  const [themeKey, setThemeKey] = React.useState(saved.themeKey || TWEAK_DEFAULTS.theme);
  const [page, setPage] = React.useState(saved.page || 'dashboard');
  const [showLogin, setShowLogin] = React.useState(saved.showLogin ?? TWEAK_DEFAULTS.showLogin);
  const [selectedTenant, setSelectedTenant] = React.useState(null);
  const [editMode, setEditMode] = React.useState(false);

  const theme = THEMES[themeKey];

  React.useEffect(() => {
    localStorage.setItem('akyildiz_v2', JSON.stringify({ themeKey, page, showLogin }));
    document.body.style.background = theme.bg;
    document.body.style.fontFamily = theme.fontSans;
  }, [themeKey, page, showLogin]);

  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setEditMode(true);
      if (e.data?.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const handleNav = (p) => { setSelectedTenant(null); setPage(p); };

  if (showLogin) return <LoginPage theme={theme} onLogin={() => setShowLogin(false)} />;

  let content;
  if (selectedTenant) content = <TenantDetailPage theme={theme} tenant={selectedTenant} onBack={() => setSelectedTenant(null)} />;
  else if (page === 'dashboard') content = <DashboardPage theme={theme} />;
  else if (page === 'tenants') content = <TenantsPage theme={theme} onSelectTenant={setSelectedTenant} />;
  else if (page === 'payments') content = <PaymentsPage theme={theme} />;
  else if (page === 'expenses') content = <ExpensesPage theme={theme} />;
  else if (page === 'debts') content = <DebtsPage theme={theme} />;
  else if (page === 'units') content = <UnitsPage theme={theme} />;
  else if (page === 'requests') content = <RequestsPage theme={theme} />;
  else if (page === 'reports') content = <ReportsPage theme={theme} />;
  else if (page === 'profile') content = <ProfilePage theme={theme} />;

  return (
    <div data-screen-label={"01 " + page} style={{ minHeight: '100vh', background: theme.bg, color: theme.text, fontFamily: theme.fontSans }}>
      <UI.TopNav theme={theme} current={page} onNav={handleNav} />
      <main>{content}</main>

      {/* Profile shortcut - floating */}
      <button onClick={() => setPage('profile')} style={{
        position: 'fixed', right: 24, bottom: 24, zIndex: 30,
        background: theme.surface, border: `1px solid ${theme.borderStrong}`,
        padding: '10px 16px', borderRadius: 999, cursor: 'pointer',
        fontSize: 12.5, fontWeight: 600, color: theme.text, fontFamily: 'inherit',
        display: 'flex', alignItems: 'center', gap: 8,
        boxShadow: '0 10px 30px rgba(0,0,0,0.3)',
      }}>
        <Icon name="settings" size={14} color={theme.accent} />
        Yönetim Paneli
      </button>

      {editMode && (
        <div style={{
          position: 'fixed', right: 24, top: 80, zIndex: 100,
          background: theme.surface, border: `1px solid ${theme.borderStrong}`,
          borderRadius: 14, padding: 18, width: 280,
          boxShadow: '0 20px 60px rgba(0,0,0,0.5)', color: theme.text,
        }}>
          <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 4 }}>Tweaks</div>
          <div style={{ fontSize: 11.5, color: theme.textMuted, marginBottom: 16 }}>Görsel stili değiştir</div>

          <div style={{ fontSize: 10, fontWeight: 600, color: theme.textMuted, textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 8 }}>Renk Teması</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            {Object.entries(THEMES).map(([k, t]) => (
              <button key={k} onClick={() => {
                setThemeKey(k);
                window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { theme: k } }, '*');
              }} style={{
                display: 'flex', alignItems: 'center', gap: 10, padding: '10px 12px',
                borderRadius: 10, border: `1px solid ${themeKey === k ? t.accent : theme.border}`,
                background: themeKey === k ? t.accentBg : theme.surfaceAlt,
                cursor: 'pointer', textAlign: 'left', color: theme.text, fontFamily: 'inherit',
              }}>
                <div style={{ display: 'flex', gap: 3 }}>
                  <span style={{ width: 14, height: 28, borderRadius: 4, background: t.bg, border: `1px solid ${t.border}` }}></span>
                  <span style={{ width: 14, height: 28, borderRadius: 4, background: t.surface }}></span>
                  <span style={{ width: 14, height: 28, borderRadius: 4, background: t.accent }}></span>
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 12.5, fontWeight: 600 }}>{t.name}</div>
                  <div style={{ fontSize: 10.5, color: theme.textMuted, marginTop: 2 }}>{t.desc}</div>
                </div>
                {themeKey === k && <Icon name="check" size={14} color={t.accent} strokeWidth={3} />}
              </button>
            ))}
          </div>

          <div style={{ height: 1, background: theme.border, margin: '16px 0' }}></div>
          <label style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', cursor: 'pointer', fontSize: 12.5 }}>
            <span>Login ekranını göster</span>
            <input type="checkbox" checked={showLogin} onChange={(e) => setShowLogin(e.target.checked)} />
          </label>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
